name: Build Quantum Trader APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # سيقوم هذا الأمر ببدء عملية البناء وقبول جميع الرخص تلقائياً
          yes | buildozer -v android debug
        continue-on-error: false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: quantum-trader-apk
          path: bin/*.apk
