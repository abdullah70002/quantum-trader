# ╔═══════════════════════════════════════════════════════════════════╗
# ║   QUANTUM TRADER — GitHub Actions: Android APK Build             ║
# ║                                                                   ║
# ║   Trigger: push to main  OR  manual workflow_dispatch             ║
# ║   Output:  quantum-trader.apk  (uploaded as build artifact)       ║
# ║                                                                   ║
# ║   Tech stack:                                                     ║
# ║     • Python 3.11  (app logic + Flet SDK)                        ║
# ║     • Flutter 3.24 (Flet's underlying framework)                  ║
# ║     • Java 17      (Android Gradle build tools)                   ║
# ║     • Android SDK  (API 33, NDK 25b)                              ║
# ╚═══════════════════════════════════════════════════════════════════╝

name: Build Quantum Trader APK

on:
  push:
    branches:
      - main
  workflow_dispatch:    # lets you trigger the build manually from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  BUILD JOB
  # ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04      # pinned for reproducibility

    steps:
      # 1. Checkout source
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Python 3.11
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Java 17 (required by Android Gradle)
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 4. Flutter (Flet compiles to Flutter under the hood)
      - name: 🦋 Set up Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: stable
          cache: true

      # 5. Android SDK + NDK
      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools-version: "34.0.0"

      - name: 📦 Install Android NDK 25b
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # 6. Install Python dependencies
      - name: 📥 Install Python requirements
        run: |
          python -m pip install --upgrade pip
          # Flet CLI — used to build the APK
          pip install "flet[all]==0.24.1"
          # App runtime dependencies (bundled into the APK)
          pip install pandas numpy ccxt yfinance requests urllib3

      # 7. Accept Android SDK licenses (non-interactive)
      - name: ✅ Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # 8. Build the APK
      #    flet build apk reads:
      #      • main.py          → app entry point
      #      • requirements.txt → Python packages to bundle
      - name: 🏗️ Build APK with Flet
        run: |
          flet build apk \
            --project         "Quantum Trader"          \
            --org             "com.quantumtrader"        \
            --build-version   "1.0.0"                   \
            --build-number    "1"                        \
            --android-permissions INTERNET               \
            --android-permissions READ_EXTERNAL_STORAGE  \
            --android-permissions WRITE_EXTERNAL_STORAGE \
            --verbose

      # 9. Rename APK for clarity
      - name: 🏷️ Rename APK artifact
        run: |
          mkdir -p dist
          find build -name "*.apk" -exec cp {} dist/quantum-trader-v1.0.0.apk \;
          ls -lh dist/

      # 10. Upload APK as a downloadable GitHub artifact
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantum-trader-apk
          path: dist/quantum-trader-v1.0.0.apk
          retention-days: 30      # artifact is kept for 30 days
          if-no-files-found: error

      # 11. (Optional) Create a GitHub Release on version tags
      #     Uncomment this block and push a tag like v1.0.0 to trigger.
      # - name: 🚀 Create GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/v')
