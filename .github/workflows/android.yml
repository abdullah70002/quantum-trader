name: Build Quantum Trader APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🦋 Set up Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: stable
          cache: true

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools-version: "34.0.0"

      - name: 📦 Install Android NDK 25b
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: 📥 Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install "flet[all]==0.24.1"
          pip install pandas numpy ccxt yfinance requests urllib3

      - name: ✅ Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: 🏗️ Build APK with Flet
        run: |
          # لاحظ التعديل هنا: استخدمنا الصيغة المختصرة والمباشرة للأمر
          flet build apk \
            --project "Quantum Trader" \
            --android-permissions "internet" \
            --verbose

      - name: 🏷️ Rename APK artifact
        run: |
          mkdir -p dist
          find build/apk -name "*.apk" -exec cp {} dist/quantum-trader-v1.0.0.apk \; || cp build/app/outputs/flutter-apk/app-release.apk dist/quantum-trader-v1.0.0.apk
          ls -lh dist/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantum-trader-apk
          path: dist/quantum-trader-v1.0.0.apk
          retention-days: 30
