# ╔═══════════════════════════════════════════════════════════════════╗
# ║   QUANTUM TRADER — GitHub Actions: Android APK Build  v3         ║
# ║                                                                   ║
# ║   Fixes applied vs v2:                                            ║
# ║     • Install libgtk-3-dev  → fixes [✗] Linux toolchain          ║
# ║     • flutter config --android-sdk  → fixes [!] Android Studio   ║
# ║     • ANDROID_SDK_ROOT exported for Gradle                        ║
# ║     • flutter doctor --android-licenses (non-interactive)         ║
# ╚═══════════════════════════════════════════════════════════════════╝

name: Build Quantum Trader APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Source code ────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. System libs (fixes "Linux toolchain" flutter doctor error) ──
      - name: 🔧 Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libglu1-mesa \
            cmake \
            ninja-build \
            clang \
            pkg-config \
            curl \
            unzip \
            xz-utils \
            zip

      # ── 3. Python 3.11 ───────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 4. Java 17 (Gradle needs it) ─────────────────────────────
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 5. Flutter 3.24 ──────────────────────────────────────────
      - name: 🦋 Set up Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: stable
          cache: true

      # ── 6. Android SDK ───────────────────────────────────────────
      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android components
        run: |
          sdkmanager --update
          sdkmanager \
            "platforms;android-33" \
            "build-tools;34.0.0"  \
            "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME"                   >> $GITHUB_ENV

      # ── 7. Accept all Android licenses ───────────────────────────
      - name: ✅ Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          yes | flutter doctor --android-licenses || true

      # ── 8. Tell Flutter where the Android SDK lives ───────────────
      #       Eliminates "[!] Android Studio not installed" by pointing
      #       Flutter directly at the SDK — no Android Studio needed.
      - name: 🔗 Configure Flutter Android SDK path
        run: |
          flutter config --android-sdk "$ANDROID_HOME"
          flutter config --no-analytics
          flutter precache --android

      # ── 9. Sanity check (informational, never fails the build) ────
      - name: 🩺 Flutter doctor (info only)
        run: flutter doctor -v || true

      # ── 10. Python requirements ───────────────────────────────────
      - name: 📥 Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install "flet[all]==0.24.1"
          pip install pandas numpy ccxt yfinance requests urllib3

      # ── 11. Build APK ─────────────────────────────────────────────
      #        Permissions are declared in pyproject.toml, not CLI flags.
      - name: 🏗️ Build APK with Flet
        run: |
          flet build apk \
            --project       "Quantum Trader" \
            --org           "com.quantumtrader" \
            --build-version "1.0.0" \
            --build-number  "1" \
            --verbose
        env:
          ANDROID_HOME:     ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_HOME:        ${{ env.JAVA_HOME }}

      # ── 12. Locate & rename the APK ──────────────────────────────
      - name: 🏷️ Collect APK
        run: |
          mkdir -p dist
          APK=$(find . -name "*.apk" ! -path "*/gradle/*" | head -1)
          echo "Found APK: $APK"
          cp "$APK" dist/quantum-trader-v1.0.0.apk
          ls -lh dist/

      # ── 13. Upload artifact ───────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantum-trader-apk
          path: dist/quantum-trader-v1.0.0.apk
          retention-days: 30
          if-no-files-found: error
