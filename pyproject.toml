# ╔══════════════════════════════════════════════════════╗
# ║  QUANTUM TRADER — Flet project configuration         ║
# ║  This is the CORRECT way to set Android permissions  ║
# ║  in Flet 0.21+. CLI flags were removed.              ║
# ╚══════════════════════════════════════════════════════╝

[tool.flet]
org     = "com.quantumtrader"
product = "Quantum Trader"

[tool.flet.app]
# Entry point of the Flet app
module = "main"

[tool.flet.android]
# Android permissions — declared here, NOT via --android-permissions CLI flag
permissions = [
    "android.permission.INTERNET",
    "android.permission.READ_EXTERNAL_STORAGE",
    "android.permission.WRITE_EXTERNAL_STORAGE",
]

# Target / minimum Android API levels
target_platform   = "android"
min_sdk_version   = 21      # Android 5.0+
target_sdk_version = 33     # Android 13

# App metadata
version_code = 1
version_name = "1.0.0"
